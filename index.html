<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فوال مروه - التطبيق الرسمي</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="فوال مروه">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#1e40af">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { background-color: #1e40af; color: white; transform: scale(1.05); }
        .meal-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f3f4f6; }
        .meal-card:active { transform: scale(0.95); }
        .cart-badge { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        
        /* تنسيق الإشعار العصري */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #1e40af;
            color: #fff;
            text-align: center;
            border-radius: 50px;
            padding: 16px;
            position: fixed;
            z-index: 9999;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: bold;
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 80mm; padding: 5mm; }
        }
    </style>
</head>
<body class="bg-gray-50 select-none">

    <div id="toast"></div>

    <header class="bg-blue-800 text-white p-4 sticky top-0 z-40 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="icon.png" class="w-10 h-10 rounded-full border-2 border-white shadow-sm" alt="logo">
                <div>
                    <h1 class="font-black text-lg leading-tight">فوال مروه</h1>
                    <p class="text-[10px] opacity-80">س.ت: 5855364402</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="openHistory()" class="relative p-2 hover:bg-blue-700 rounded-full transition-colors">
                    <i class="fas fa-history text-xl"></i>
                </button>
                <button onclick="toggleCart()" class="relative p-2 hover:bg-blue-700 rounded-full transition-colors">
                    <i class="fas fa-shopping-basket text-xl"></i>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-blue-800 cart-badge hidden">0</span>
                </button>
            </div>
        </div>
    </header>

    <nav class="bg-white shadow-sm sticky top-[72px] z-30 overflow-x-auto no-scrollbar border-b">
        <div class="flex p-3 gap-2 w-max mx-auto" id="categoryList"></div>
    </nav>

    <div class="p-4">
        <div class="bg-gradient-to-r from-blue-700 to-blue-500 rounded-2xl p-5 text-white shadow-md relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-xl font-bold mb-1">أهلاً بك في مروه 🍲</h2>
                <p class="text-sm opacity-90">استمتع بألذ فطور شعبي ساخن..</p>
                <button onclick="document.getElementById('neighborModal').classList.remove('hidden')" class="mt-4 bg-white text-blue-800 px-4 py-2 rounded-full text-xs font-bold shadow-sm active:scale-95 transition-transform">
                    <i class="fas fa-map-marker-alt ml-1"></i> أنا من سكان "حي بدر"
                </button>
            </div>
            <i class="fas fa-utensils absolute -bottom-4 -left-4 text-8xl opacity-10 rotate-12"></i>
        </div>
    </div>

    <main class="container mx-auto p-4 pb-24 min-h-screen">
        <div id="itemsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </main>

    <div id="cartSidebar" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="toggleCart()"></div>
        <div class="absolute left-0 top-0 h-full w-full max-w-md bg-white shadow-2xl flex flex-col animate-slide-left">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-lg text-blue-900"><i class="fas fa-shopping-cart ml-2"></i>سلة الطلبات</h3>
                <button onclick="toggleCart()" class="text-gray-500 text-2xl">&times;</button>
            </div>
            
            <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

            <div class="p-4 bg-gray-50 border-t space-y-4">
                <div class="flex justify-between items-center text-xl font-black text-blue-900">
                    <span>الإجمالي:</span>
                    <span id="cartTotal">0﷼</span>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 mr-2">نوع الطلب</label>
                        <select id="oType" class="w-full border rounded-xl p-2.5 text-sm bg-white outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="محلي">🍽️ محلي</option>
                            <option value="سفري">🥡 سفري</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 mr-2">طريقة الدفع</label>
                        <select id="payWay" class="w-full border rounded-xl p-2.5 text-sm bg-white outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="عند الاستلام">💵 كاش</option>
                            <option value="شبكة">💳 شبكة</option>
                        </select>
                    </div>
                </div>

                <button onclick="confirmAndSend()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 text-lg active:scale-95">
                    <i class="fab fa-whatsapp text-2xl"></i> إرسال الطلب عبر الواتساب
                </button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="p-5 border-b flex justify-between items-center bg-blue-900 text-white">
                <div>
                    <h3 class="font-bold text-lg leading-tight">سجل الطلبات</h3>
                    <p class="text-xs opacity-70">آخر 30 طلب محفوظ محلياً</p>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="checkAdmin()" class="text-xs bg-white/20 px-3 py-1.5 rounded-lg hover:bg-white/30 transition-colors">إدارة النظام</button>
                    <button onclick="closeHistory()" class="text-2xl leading-none">&times;</button>
                </div>
            </div>
            <div id="historyContent" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50"></div>
        </div>
    </div>

    <div id="neighborModal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl border-2 border-blue-500">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-truck text-blue-600 text-3xl"></i>
            </div>
            <h3 class="text-xl font-black text-blue-900 mb-2 text-center">خدمة توصيل حي بدر 🚚</h3>
            <p class="text-gray-600 text-sm mb-6 leading-relaxed">أهلاً بزبوننا الغالي من سكان حي بدر.. فعل ميزة التوصيل المجاني للطلبات فوق 50 ريال.</p>
            <input type="text" id="neighborCode" placeholder="أدخل كود المنطقة (إختياري)" class="w-full border-2 rounded-xl p-3 mb-4 outline-none focus:border-blue-600 text-center font-bold">
            <div class="flex gap-3">
                <button onclick="document.getElementById('neighborModal').classList.add('hidden')" class="flex-1 py-3 text-gray-400 font-bold">إلغاء</button>
                <button onclick="activateNeighbor()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 active:scale-95 transition-all">تفعيل الميزة</button>
            </div>
        </div>
    </div>

    <div id="printArea" class="hidden text-black font-mono"></div>

    <script>
        // الأصناف الكاملة كما هي في ملفك الأصلي دون أي حذف
        const DB = [
            { id: 1, name: "فول مروه سادة", price: 9, cat: "فول", img: "🍲" },
            { id: 2, name: "فول مروه بالسمن", price: 11, cat: "فول", img: "🥣" },
            { id: 3, name: "فول مروه بزيت الزيتون", price: 11, cat: "فول", img: "🫒" },
            { id: 4, name: "فول مروه بالتونة", price: 15, cat: "فول", img: "🐟" },
            { id: 5, name: "فول مروه ملوكي", price: 18, cat: "فول", img: "👑" },
            { id: 6, name: "فول قلابة سادة", price: 9, cat: "فول", img: "🥘" },
            { id: 7, name: "عدس مروه سادة", price: 9, cat: "عدس", img: "🥣" },
            { id: 8, name: "عدس مروه ملوكي", price: 18, cat: "عدس", img: "✨" },
            { id: 9, name: "شكشوكة مروه", price: 11, cat: "بيض", img: "🍳" },
            { id: 10, name: "بيض عيون", price: 9, cat: "بيض", img: "🍳" },
            { id: 11, name: "لحسة مروه", price: 18, cat: "بيض", img: "🧀" },
            { id: 12, name: "كبدة غنم بلدي", price: 24, cat: "لحوم", img: "🥩" },
            { id: 13, name: "تقاطيع مروه", price: 20, cat: "لحوم", img: "🔥" },
            { id: 14, name: "مطبق مروه مالح", price: 9, cat: "مطبق", img: "🥞" },
            { id: 15, name: "مطبق مروه خضار", price: 10, cat: "مطبق", img: "🥗" },
            { id: 16, name: "مطبق مروه ملوكي", price: 15, cat: "مطبق", img: "🌟" },
            { id: 17, name: "معصوب مروه سادة", price: 9, cat: "معصوب", img: "🍌" },
            { id: 18, name: "معصوب مروه ملكي", price: 18, cat: "معصوب", img: "💎" },
            { id: 19, name: "عريكة مروه دبل", price: 22, cat: "معصوب", img: "🔥" },
            { id: 20, name: "عريكة مروه ملوكي", price: 26, cat: "معصوب", img: "🏆" }
        ];

        let cart = [];
        let currentCat = "الكل";
        let isNeighbor = false;

        // وظيفة الإشعار العصري
        function showToast(text) {
            const toast = document.getElementById("toast");
            toast.innerText = text;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // منطق زر الرجوع
        function handleBack() {
            if (!document.getElementById('cartSidebar').classList.contains('hidden')) {
                toggleCart();
            } else if (!document.getElementById('historyModal').classList.contains('hidden')) {
                closeHistory();
            } else if (!document.getElementById('neighborModal').classList.contains('hidden')) {
                document.getElementById('neighborModal').classList.add('hidden');
            } else {
                if (confirm("هل أنت متأكد من رغبتك في الخروج من التطبيق؟")) {
                    window.history.back();
                } else {
                    history.pushState(null, null, window.location.pathname);
                }
            }
        }

        window.onload = () => {
            renderCategories();
            renderItems();
            history.pushState(null, null, window.location.pathname);
            window.addEventListener('popstate', handleBack);
        };

        function renderCategories() {
            const cats = ["الكل", ...new Set(DB.map(i => i.cat))];
            const list = document.getElementById('categoryList');
            list.innerHTML = cats.map(c => `
                <button onclick="filterCat('${c}')" class="px-6 py-2.5 rounded-full text-sm font-bold whitespace-nowrap shadow-sm border transition-all ${currentCat===c?'active-tab':'bg-white text-gray-600 border-gray-100 hover:bg-gray-50'}">
                    ${c}
                </button>
            `).join('');
        }

        function filterCat(c) {
            currentCat = c;
            renderCategories();
            renderItems();
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            const items = currentCat === "الكل" ? DB : DB.filter(i => i.cat === currentCat);
            grid.innerHTML = items.map(i => `
                <div class="meal-card bg-white p-3 rounded-3xl relative overflow-hidden flex flex-col shadow-sm">
                    <div class="h-24 flex items-center justify-center text-4xl mb-2 bg-gray-50 rounded-2xl">${i.img}</div>
                    <h3 class="font-bold text-xs text-blue-900 mb-1 line-clamp-1">${i.name}</h3>
                    <div class="flex justify-between items-center mt-auto">
                        <span class="text-blue-700 font-black text-sm">${i.price}﷼</span>
                        <button onclick="addToCart(${i.id})" class="bg-blue-600 text-white w-8 h-8 rounded-xl flex items-center justify-center shadow-md active:bg-blue-800">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = DB.find(i => i.id === id);
            const inCart = cart.find(c => c.id === id);
            if (inCart) inCart.qty++;
            else cart.push({ ...item, qty: 1 });
            updateCartDisplay();
            showToast(`تمت إضافة ${item.name} للسلة`);
        }

        function updateCartDisplay() {
            const list = document.getElementById('cartItems');
            const count = document.getElementById('cartCount');
            const total = document.getElementById('cartTotal');
            const totalQty = cart.reduce((s, i) => s + i.qty, 0);
            const totalCash = cart.reduce((s, i) => s + (i.price * i.qty), 0);

            count.innerText = totalQty;
            count.classList.toggle('hidden', totalQty === 0);
            total.innerText = totalCash + "﷼";

            list.innerHTML = cart.map(i => `
                <div class="flex items-center justify-between bg-white p-3 rounded-2xl border-b">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-xl">${i.img}</div>
                        <div>
                            <h4 class="font-bold text-sm text-blue-900">${i.name}</h4>
                            <p class="text-xs text-blue-600 font-bold">${i.price}﷼</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 bg-gray-100 rounded-xl px-2 py-1">
                        <button onclick="changeQty(${i.id}, -1)" class="w-6 h-6 flex items-center justify-center text-blue-600"><i class="fas fa-minus text-[10px]"></i></button>
                        <span class="font-bold text-sm w-4 text-center">${i.qty}</span>
                        <button onclick="changeQty(${i.id}, 1)" class="w-6 h-6 flex items-center justify-center text-blue-600"><i class="fas fa-plus text-[10px]"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function changeQty(id, n) {
            const item = cart.find(i => i.id === id);
            item.qty += n;
            if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
            updateCartDisplay();
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('hidden');
        }

        function activateNeighbor() {
            isNeighbor = true;
            document.getElementById('neighborModal').classList.add('hidden');
            showToast("تم تفعيل ميزة سكان حي بدر ✅");
        }

        function confirmAndSend() {
            if (!cart.length) return showToast("السلة فارغة!");
            saveToHistory();
            const info = isNeighbor ? `%0A📍 *العنوان:* سكان حي بدر` : '';
            const lastLog = JSON.parse(localStorage.getItem('m_logs'))[0];
            let msg = `*طلب جديد - فوال مروه*%0A🆔 *رقم الطلب:* ${lastLog.id}%0A📢 *النوع:* ${document.getElementById('oType').value}${info}%0A--------------------------%0A`;
            cart.forEach(i => msg += `• ${i.name} [${i.qty}] = ${i.price * i.qty}﷼%0A`);
            msg += `--------------------------%0A💰 *الإجمالي: ${cart.reduce((s,i)=>s+(i.price*i.qty),0)}﷼*`;
            window.location.href = `https://wa.me/966530195433?text=${msg}`;
            cart = []; updateCartDisplay(); toggleCart();
        }

        function saveToHistory() {
            let logs = JSON.parse(localStorage.getItem('m_logs') || '[]');
            const generateID = () => Math.floor(100000 + Math.random() * 900000);
            let newID = generateID();
            logs.unshift({ id: newID, date: new Date().toLocaleString('ar-SA'), items: [...cart], total: cart.reduce((s,i)=>s+(i.price*i.qty),0) });
            localStorage.setItem('m_logs', JSON.stringify(logs.slice(0, 30)));
        }

        function openHistory() {
            const modal = document.getElementById('historyModal');
            const content = document.getElementById('historyContent');
            const logs = JSON.parse(localStorage.getItem('m_logs') || '[]');
            modal.classList.remove('hidden');
            content.innerHTML = logs.map(l => `
                <div class="bg-white p-4 rounded-2xl border-r-4 border-blue-900 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-[10px] text-gray-400 block">${l.date}</span>
                            <span class="font-black text-blue-900 text-sm">طلب #${l.id}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="printBill(${l.id})" class="text-blue-600 bg-blue-50 w-8 h-8 rounded-lg flex items-center justify-center"><i class="fas fa-print text-xs"></i></button>
                        </div>
                    </div>
                    <div class="text-[10px] text-gray-600 mb-2 border-t pt-2">${l.items.map(i => `${i.name} (${i.qty})`).join(' ، ')}</div>
                    <div class="text-right font-black text-blue-900 text-sm">${l.total}﷼</div>
                </div>
            `).join('');
        }

        function closeHistory() {
            document.getElementById('historyModal').classList.add('hidden');
        }

        function checkAdmin() {
            const pin = prompt("أدخل كلمة مرور الإدارة:");
            if (pin === "123456Aa") {
                if (confirm("هل تريد مسح السجلات؟")) {
                    localStorage.removeItem('m_logs');
                    openHistory();
                }
            } else {
                showToast("كلمة مرور خاطئة ❌");
            }
        }

        function printBill(id) {
            const log = JSON.parse(localStorage.getItem('m_logs')).find(l => l.id === id);
            const area = document.getElementById('printArea');
            area.innerHTML = `
                <div style="text-align:center">
                    <h2>فوال مروه</h2>
                    <p>طلب #${log.id}</p>
                    <p>${log.date}</p>
                </div>
                <hr>
                <table style="width:100%">
                    ${log.items.map(i => `<tr><td>${i.name} [${i.qty}]</td><td style="text-align:left">${i.price*i.qty}﷼</td></tr>`).join('')}
                </table>
                <hr>
                <div style="text-align:left; font-weight:bold">الإجمالي: ${log.total}﷼</div>
            `;
            window.print();
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
        }
    </script>
</body>
</html>
