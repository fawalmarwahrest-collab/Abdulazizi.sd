    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; user-select: none; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-blur { backdrop-filter: blur(15px); background: rgba(15, 23, 42, 0.8); }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        /* تحسينات بطاقة الصنف مع الصور */
        .item-card { overflow: hidden; transition: all 0.3s ease; }
        .item-card.active { transform: translateY(-5px); }
        .item-card.active .sizes-panel { max-height: 500px; opacity: 1; margin-top: 15px; }
        .sizes-panel { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        
        .img-container { height: 160px; width: 100%; position: relative; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-cover: cover; transition: transform 0.5s ease; }
        .item-card.active img { transform: scale(1.1); }

        #customToast {
            visibility: hidden; min-width: 280px; background-color: #1e293b; color: #fff;
            text-align: center; border-radius: 20px; padding: 16px; position: fixed;
            z-index: 10000; left: 50%; bottom: 120px; transform: translateX(-50%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); font-weight: bold; opacity: 0; transition: 0.3s;
        }
        #customToast.show { visibility: visible; opacity: 1; }
        #receiptUI { background: #fff; padding: 25px; border-radius: 20px; border: 2px solid #f1f5f9; width: 320px; margin: 0 auto; color: #1e293b; position: relative; }
        .input-error { border: 2px solid #ef4444 !important; background-color: #fef2f2 !important; }
        .input-error::placeholder { color: #ef4444; opacity: 0.7; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>

        let cart = [];
        let isNeighbor = localStorage.getItem('isNbr') === 'true';
        let currentCategory = "الوجبات";
        let activeItemId = null;
        let deferredPrompt;

        window.onload = () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
            }

            history.pushState(null, null, window.location.pathname);
            window.addEventListener('popstate', function (event) {
                const modal = document.getElementById('mainModal');
                if (modal && modal.style.display === 'flex') {
                    closeModal();
                    history.pushState(null, null, window.location.pathname);
                } else {
                    history.pushState(null, null, window.location.pathname);
                    showToast("للحصول على أفضل تجربة، ثبت التطبيق 📱");
                }
            });

            cleanOldLogs(); renderTabs(); renderItems(); updateCartDisplay(); setNeighborUI();
            if(!localStorage.getItem('first_welcome_v11')) showWelcomeMessage();
        };

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        async function handleInstall() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
            
            if (isIOS && !isStandalone) {
                openModalLogic(`
                    <div class="text-center py-6">
                        <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 text-4xl"><i class="fa-solid fa-mobile-screen-button"></i></div>

                        <div class="space-y-6 text-right font-bold text-slate-600">
                            <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl">
                                <span class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">1</span>
                                <p>اضغط على زر المشاركة <i class="fa-solid fa-arrow-up-from-bracket text-blue-600 mx-1"></i> في أسفل المتصفح.</p>
                            </div>
                            <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl">
                                <span class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">2</span>
                                <p>اختر "إضافة إلى الصفحة الرئيسية" <i class="fa-regular fa-square-plus text-blue-600 mx-1"></i> من القائمة.</p>
                            </div>
                            <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl">
                                <span class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">3</span>
                                <p>اضغط على "إضافة" في الزاوية العلوية.</p>
                            </div>
                        </div>
                        <button onclick="closeModal()" class="w-full bg-blue-800 text-white py-4 rounded-2xl font-black mt-8 shadow-lg">فهمت</button>
                    </div>
                `);
                return;
            }

            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') deferredPrompt = null;
            } else if (isStandalone) {
                showToast("التطبيق مثبت بالفعل على جهازك ✅", "#10b981");
            } else {
                showToast("متصفحك لا يدعم التثبيت المباشر، جرب متصفح Chrome 🌐");
            }
        }

        function showToast(text, color = '#1e293b') {
            const toast = document.getElementById("customToast");
            if (toast) {
                toast.innerText = text;
                toast.style.backgroundColor = color;
                toast.classList.add("show");
                setTimeout(() => { toast.classList.remove("show"); }, 3000);
            }
        }

            `);
        }

        function openModalLogic(content, backFn = null) {
            const modal = document.getElementById('mainModal');
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modalNavBtn').innerHTML = backFn ? '←' : '✕';
            document.getElementById('modalNavBtn').onclick = () => backFn ? backFn() : closeModal();
            modal.style.display = 'flex';
        }
        function closeModal() { document.getElementById('mainModal').style.display = 'none'; }

        function renderTabs() {
            const tabs = document.getElementById('categoryTabs');
            tabs.innerHTML = Object.keys(DB).map(cat => `<button onclick="setCategory('${cat}')" class="px-6 py-2 rounded-2xl whitespace-nowrap font-bold transition-all ${cat === currentCategory ? 'bg-white text-blue-900 shadow-xl' : 'text-white/70'}">${cat}</button>`).join('');
        }
        function setCategory(cat) { currentCategory = cat; renderTabs(); renderItems(); }

        // تم تحديث الدالة لعرض الصور بشكل جذاب
        function renderItems() {
            const grid = document.getElementById('itemsGrid');

                const isActive = activeItemId === item.id;
                // مسار افتراضي في حال نسيان الصورة

                <div class="bg-white rounded-[35px] shadow-sm border border-slate-50 item-card ${isActive ? 'active shadow-lg' : ''}" onclick="toggleItem(${item.id})">
                    <div class="img-container">
                        <img src="${itemImg}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/400x200?text=Food'">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        <div class="absolute bottom-4 right-6 text-white text-xl font-black">${item.name}</div>
                    </div>
                    
                    <div class="p-6">
                        <div class="flex justify-between items-center">
                            <div class="text-slate-400 text-xs font-bold">انقر للتفاصيل</div>
                            ${item.price ? `<div class="flex items-center gap-3 bg-slate-50 p-2 rounded-2xl">
                                    <button onclick="event.stopPropagation(); updateQty(${item.id}, -1, '${item.name}', ${item.price})" class="w-10 h-10 bg-white text-red-500 rounded-xl shadow-md font-black">-</button>

            const key = `${id}-${size}`;

                cart[idx].qty += delta; 
                if (cart[idx].qty <= 0) cart.splice(idx, 1); 
            }
            else if (delta > 0) {
                cart.push({ id, key, name: size !== 'default' ? `${name} (${getSizeName(size)})` : name, price, qty: 1, size, note: '' });
            }
            updateCartDisplay(); 
            if(document.getElementById('cartRefCheck')) renderCartInModal();
            renderItems();
        }

        async function printToBluetooth(order) {
            let receiptText = "";
            receiptText += "\x1B\x61\x01"; 
            receiptText += "FAWAL MARWAH\n";
            receiptText += "C.R: 2055134169\n";
            receiptText += "--------------------------------\n";
            receiptText += `ORDER ID: ${order.id}\n`;
            receiptText += `${new Date(order.timestamp).toLocaleString('en-US')}\n`;
            receiptText += "--------------------------------\n";
            receiptText += "\x1B\x61\x00"; 
            
            order.items.forEach(it => {
                receiptText += `${it.name}\n`;
                receiptText += `QTY: ${it.qty} | PRICE: ${it.price * it.qty} SAR\n`;
            });

            receiptText += "--------------------------------\n";
            receiptText += `TOTAL: ${order.total} SAR\n`;
            receiptText += "--------------------------------\n";
            receiptText += "\n\n\n\n";

            try {
                showToast("جاري البحث عن طابعة...");
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }, { namePrefix: 'TP' }, { namePrefix: 'Printer' }],
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
                const encoder = new TextEncoder();
                const data = encoder.encode(receiptText);
                await characteristic.writeValue(data);
                showToast("تم إرسال الطلب للطابعة ✅", "#10b981");
            } catch (error) {
                console.error(error);
                showToast("فشل الاتصال بالطابعة ❌", "#ef4444");
            }
        }

        function processReverseOrder() {
            const text = document.getElementById('waPaste').value;
            if(!text) return;
            try {
                const idMatch = text.match(/ID:\s*(\d+)/);
                const typeMatch = text.match(/النوع:\s*([^\n]+)/);
                const payMatch = text.match(/الدفع:\s*([^\n]+)/);
                const totalMatch = text.match(/الإجمالي:\s*(\d+)/);
                const itemLines = text.match(/•\s*([^\n\[]+)\[(\d+)\]\s*=\s*(\d+)/g);
                
                if(!itemLines || !idMatch) { showToast("تنسيق غير صحيح ⚠️", "#ef4444"); return; }
                
                const importedItems = itemLines.map(line => {
                    const p = line.match(/•\s*([^\n\[]+)\[(\d+)\]\s*=\s*(\d+)/);
                    const qty = parseInt(p[2]);
                    const totalPrice = parseInt(p[3]);
                    return { name: p[1].trim(), qty: qty, price: totalPrice/qty, key: Math.random(), id: 999 };
                });

                const newOrder = { 
                    id: idMatch[1], 
                    timestamp: Date.now(), 
                    items: importedItems, 
                    total: totalMatch ? parseInt(totalMatch[1]) : 0, 
                    type: typeMatch ? typeMatch[1].trim() : "مستورد", 
                    payment: payMatch ? payMatch[1].trim() : "كاش 💵" 
                };

                if(!saveToLogs(newOrder)) { 
                    openModalLogic(`
                        <div class="text-center py-6">
                            <div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">🚫</div>
                            <h3 class="text-xl font-black text-red-600 mb-2">تنبيه: الطلب مكرر!</h3>
                            <p class="text-xs font-bold text-slate-500 mb-6 px-4">يوجد طلب في السجل بنفس الـ ID: <span class="text-red-600">${newOrder.id}</span> بنفس التفاصيل.</p>
                            <button onclick='saveWithNewID(${JSON.stringify(newOrder)})' class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">توليد ID جديد وحفظ الطلب</button>
                            <button onclick="showLogCategories()" class="w-full bg-slate-100 text-slate-500 py-3 rounded-2xl font-bold mt-3">إلغاء</button>
                        </div>
                    `);
                    return;
                }
                showToast("تم الحفظ بنجاح ✅", "#10b981"); 
                showLogCategories(); 
            } catch(e) { showToast("خطأ في القراءة ❌", "#ef4444"); }
        }

        function saveWithNewID(order) {
            order.id = generateUniqueID();
            saveToLogs(order);
            showToast("تم توليد ID جديد وحفظ الطلب ✅", "#10b981");
            showLogCategories();
        }

        function saveFavorite(favName) {
            if(!cart.length) return;
            let favs = JSON.parse(localStorage.getItem('m_favs_v11') || '[]');
            const idx = favs.findIndex(f => f.name === favName);
            const newFav = { name: favName, items: JSON.parse(JSON.stringify(cart)), total: cart.reduce((s,i)=>s+(i.price*i.qty),0) };
            if(idx > -1) favs[idx] = newFav;
            else favs.push(newFav);
            localStorage.setItem('m_favs_v11', JSON.stringify(favs));
            showToast(`تم حفظ ${favName} ❤️`, "#f43f5e");
            toggleFavNames();
        }

        function showFavoriteList() {
            const favs = JSON.parse(localStorage.getItem('m_favs_v11') || '[]');
            let content = `<h2 class="text-2xl font-black mb-6 text-red-600 text-center">وجباتي المفضلة</h2><div class="space-y-4">`;
            content += favs.map((f, i) => `<div onclick="previewFav(${i})" class="p-6 bg-white rounded-[30px] border flex justify-between items-center shadow-sm"><span class="font-black text-lg">${f.name}</span><button onclick="event.stopPropagation(); deleteFav(${i})" class="text-red-200"><i class="fa-solid fa-trash-can"></i></button></div>`).join('');
            openModalLogic(content + (favs.length ? '' : '<p class="text-center py-10 opacity-30 font-bold">لا توجد وجبات</p>') + '</div>');
        }

        function previewFav(index) {
            const f = JSON.parse(localStorage.getItem('m_favs_v11'))[index];
            openModalLogic(`<h2 class="text-2xl font-black mb-6 text-red-600 text-center">${f.name}</h2><div class="bg-slate-50 p-6 rounded-[35px] border mb-6">${f.items.map(it => `<div class="flex justify-between font-bold text-sm mb-2"><span>• ${it.name} [${it.qty}]</span><span>${it.price*it.qty}﷼</span></div>`).join('')}<div class="border-t-2 mt-4 pt-4 flex justify-between font-black text-xl text-red-600"><span>الإجمالي:</span><span>${f.total}﷼</span></div></div><button onclick="applyFav(${index})" class="w-full bg-red-600 text-white py-5 rounded-3xl font-black text-lg shadow-xl">تعبئة السلة 🛒</button>`, showFavoriteList);
        }

        function applyFav(index) {
            const f = JSON.parse(localStorage.getItem('m_favs_v11'))[index];
            cart = JSON.parse(JSON.stringify(f.items)); updateCartDisplay(); renderItems(); closeModal(); showToast("تم تحديث السلة ✅");
        }
        function deleteFav(i) {
            let favs = JSON.parse(localStorage.getItem('m_favs_v11')); favs.splice(i, 1);
            localStorage.setItem('m_favs_v11', JSON.stringify(favs)); showFavoriteList();
        }

        function openNbrModal() {
            openModalLogic(`<div class="text-center"><div class="w-20 h-20 bg-emerald-50 text-emerald-600 rounded-3xl flex items-center justify-center mx-auto mb-4 text-3xl"><i class="fa-solid fa-key"></i></div><h2 class="text-2xl font-black mb-4 text-emerald-900">كود تفعيل الجيران</h2><input type="text" id="nbrInput" placeholder="أدخل الكود" class="w-full p-5 bg-slate-50 rounded-2xl border-2 text-center font-black mb-4 outline-none border-slate-100 focus:border-emerald-500 transition-all"><button onclick="verifyNbr()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg">${isNeighbor ? 'إيقاف خدمة التوصيل' : 'تفعيل الخدمة'}</button></div>`);
        }

        function verifyNbr() {
            if(document.getElementById('nbrInput').value.trim() === "حي بدر") {
                isNeighbor = !isNeighbor;
                localStorage.setItem('isNbr', isNeighbor);
                setNeighborUI(); renderItems();
                if(isNeighbor) {
                    openModalLogic(`<div class="text-center py-6"><div class="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl">🏘️</div><h2 class="text-3xl font-black mb-4 text-emerald-900">أهلاً بجيراننا!</h2><p class="text-slate-600 font-bold mb-8 text-lg leading-relaxed">تم تفعيل نظام <span class=\"text-emerald-600\">التوصيل المجاني</span> لحي بدر بنجاح.</p><button onclick="closeModal()" class="w-full bg-emerald-600 text-white py-5 rounded-3xl font-black shadow-xl">ابدأ طلبك الآن</button></div>`);
                } else {
                    closeModal();
                    showToast("تم العودة للوضع العادي 🏢");
                }
            } else showToast("الكود خاطئ!", "#ef4444");
        }

        function setNeighborUI() {
            const btn = document.getElementById('nbrBtn');
            btn.className = isNeighbor ? "p-6 rounded-[35px] bg-emerald-600 text-white flex justify-between items-center shadow-lg transform active:scale-95 transition cursor-pointer" : "p-6 rounded-[35px] bg-blue-800 text-white flex justify-between items-center shadow-lg transform active:scale-95 transition cursor-pointer";
            document.getElementById('nbrLabel').innerText = isNeighbor ? "التوصيل المجاني للجيران مفعل ✅" : "أدخل الكود للتوصيل المجاني";
            document.getElementById('nbrIcon').className = isNeighbor ? "fa-solid fa-unlock-keyhole text-xl" : "fa-solid fa-lock text-xl opacity-40";
        }
    </script>
</body>
</html>
