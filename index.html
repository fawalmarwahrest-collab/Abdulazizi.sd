<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فوال مروه - التطبيق الرسمي</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#1e40af">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; user-select: none; -webkit-tap-highlight-color: transparent; }
        .nav-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .category-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .category-card:active { transform: scale(0.95); }
        .modal-blur { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }
        .hidden { display: none !important; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes bounce-in { 0% { transform: translateY(100%); } 70% { transform: translateY(-10px); } 100% { transform: translateY(0); } }
        .animate-bounce-in { animation: bounce-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="pb-32">

    <div id="splash" class="fixed inset-0 z-[9999] bg-blue-800 flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <div class="relative">
            <div class="w-32 h-32 bg-white/10 rounded-[40px] animate-ping absolute inset-0"></div>
            <img src="icon.png" class="w-32 h-32 rounded-[40px] shadow-2xl relative z-10" alt="Logo">
        </div>
        <h1 class="mt-8 text-3xl font-black tracking-tighter">فوال مروه</h1>
        <div class="mt-4 flex gap-2">
            <div class="w-2 h-2 bg-white rounded-full animate-bounce"></div>
            <div class="w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            <div class="w-2 h-2 bg-white rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
        </div>
    </div>

    <header class="nav-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-slate-100">
        <div>
            <h2 class="text-xs font-black text-blue-600 uppercase tracking-widest">مرحباً بك في</h2>
            <h1 class="text-2xl font-black text-slate-900">فوال مروه 🍳</h1>
        </div>
        <button onclick="toggleMenu()" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-600 shadow-sm">
            <i class="fa-solid fa-bars-staggered text-xl"></i>
        </button>
    </header>

    <div id="sideMenu" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="toggleMenu()"></div>
        <div class="absolute left-0 top-0 bottom-0 w-80 bg-white shadow-2xl p-8 animate-slide-left">
            <h2 class="text-2xl font-black mb-8 text-blue-900">القائمة</h2>
            <div class="space-y-4">
                <button onclick="handleInstall()" class="w-full flex items-center gap-4 p-4 bg-blue-50 text-blue-800 rounded-2xl font-black transition active:scale-95">
                    <i class="fa-solid fa-download"></i> تثبيت التطبيق
                </button>
                <button onclick="openNbrModal()" id="nbrBtn" class="w-full flex items-center gap-4 p-4 bg-gradient-to-r from-blue-700 to-blue-900 text-white rounded-2xl font-black shadow-lg shadow-blue-200 transition active:scale-95">
                    <i class="fa-solid fa-house-chimney text-lg"></i> تفعيل حي بدر
                </button>
                <button onclick="openFavs()" class="w-full flex items-center gap-4 p-4 bg-slate-50 text-slate-700 rounded-2xl font-black transition active:scale-95">
                    <i class="fa-solid fa-heart text-red-500"></i> طلباتك المفضلة
                </button>
                <button onclick="openHistory()" class="w-full flex items-center gap-4 p-4 bg-slate-50 text-slate-700 rounded-2xl font-black transition active:scale-95">
                    <i class="fa-solid fa-clock-rotate-left"></i> سجل المبيعات (خاص)
                </button>
            </div>
        </div>
    </div>

    <div id="iosInstallModal" class="hidden fixed inset-0 z-[5000] modal-blur flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 pb-12 shadow-2xl animate-bounce-in relative">
            <button onclick="document.getElementById('iosInstallModal').classList.add('hidden')" class="absolute top-6 left-6 w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-bold">✕</button>
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto mb-4">
                    <img src="icon.png" class="w-16 h-16 rounded-2xl shadow-lg" alt="App Icon">
                </div>
                <h3 class="text-2xl font-black text-blue-900">ثبت تطبيق فوال مروه</h3>
                <p class="text-slate-500 font-bold mt-2 text-sm">للحصول على أفضل تجربة اطلب من الشاشة الرئيسية</p>
            </div>
            <div class="space-y-6">
                <div class="flex items-center gap-5 bg-slate-50 p-4 rounded-2xl">
                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-blue-600 shadow-sm text-xl"><i class="fa-solid fa-arrow-up-from-bracket"></i></div>
                    <p class="font-black text-slate-700 text-sm">1. اضغط على زر <span class="text-blue-600">"المشاركة"</span> في أسفل المتصفح</p>
                </div>
                <div class="flex items-center gap-5 bg-slate-50 p-4 rounded-2xl">
                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-blue-600 shadow-sm text-xl"><i class="fa-regular fa-square-plus"></i></div>
                    <p class="font-black text-slate-700 text-sm">2. مرر للأسفل واختر <span class="text-blue-600">"إضافة للشاشة الرئيسية"</span></p>
                </div>
                <div class="flex items-center gap-5 bg-slate-50 p-4 rounded-2xl">
                    <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-blue-600 shadow-sm font-black text-xs uppercase">Add</div>
                    <p class="font-black text-slate-700 text-sm">3. اضغط على <span class="text-blue-600">"إضافة"</span> في الزاوية العلوية</p>
                </div>
            </div>
            <button onclick="document.getElementById('iosInstallModal').classList.add('hidden')" class="w-full mt-8 bg-blue-800 text-white py-5 rounded-[25px] font-black text-lg shadow-xl transform active:scale-95 transition">فهمت ذلك</button>
        </div>
    </div>

    <main class="p-6">
        <div id="menuCategories" class="flex gap-4 overflow-x-auto pb-6 no-scrollbar">
            </div>
        <div id="itemsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="cartBar" class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-xl border-t border-slate-100 z-40 transform translate-y-full transition-transform duration-500">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-blue-800 rounded-2xl flex items-center justify-center text-white relative shadow-lg shadow-blue-200">
                    <i class="fa-solid fa-bag-shopping text-2xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white w-7 h-7 rounded-full flex items-center justify-center text-xs font-black border-4 border-white">0</span>
                </div>
                <div>
                    <p class="text-slate-400 text-sm font-bold">المجموع الكلي</p>
                    <p id="totalPrice" class="text-2xl font-black text-slate-900">0﷼</p>
                </div>
            </div>
            <button onclick="openCartModal()" class="bg-blue-800 hover:bg-blue-900 text-white px-10 py-5 rounded-[25px] font-black shadow-xl shadow-blue-100 transition active:scale-95">
                تأكيد الطلب
            </button>
        </div>
    </div>

    <div id="mainModal" class="fixed inset-0 z-[200] hidden flex items-end justify-center p-4 modal-blur">
        <div class="bg-white w-full max-w-2xl rounded-[40px] overflow-hidden animate-slide-up max-h-[90vh] flex flex-col">
            <div class="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                <h2 id="modalTitle" class="text-2xl font-black text-slate-900">السلة</h2>
                <button onclick="closeModal()" class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-slate-400 font-bold shadow-sm">✕</button>
            </div>
            <div id="modalContent" class="p-8 overflow-y-auto flex-grow">
                </div>
        </div>
    </div>

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 z-[1000] hidden bg-slate-900 text-white px-8 py-4 rounded-3xl font-black shadow-2xl animate-bounce-in"></div>

    <script>
        // --- البيانات الأساسية ---
        const menu = [
            { id: 1, name: 'فول قلابة', price: { s: 5, m: 8, l: 12 }, cat: 'فطور', img: '🍳' },
            { id: 2, name: 'تميس سادة', price: { s: 1, m: 1, l: 1 }, cat: 'خبز', img: '🫓' },
            { id: 3, name: 'معصوب ملكي', price: { s: 12, m: 18, l: 25 }, cat: 'حلويات', img: '🍯' },
            { id: 4, name: 'عدس حجازي', price: { s: 6, m: 10, l: 14 }, cat: 'فطور', img: '🥣' },
            { id: 5, name: 'مطبق خضار', price: { s: 7, m: 7, l: 7 }, cat: 'مطبق', img: '🥪' }
        ];

        let cart = [];
        let isNeighbor = localStorage.getItem('isNbr') === 'true';
        let deferredPrompt;

        // --- تهيئة التطبيق ---
        window.onload = () => {
            renderItems();
            renderCategories();
            if(isNeighbor) setNeighborUI();
            setTimeout(() => { 
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').classList.add('hidden'), 500);
            }, 2000);
            checkIosPrompt();
        };

        // --- منطق التثبيت والآيفون ---
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function checkIosPrompt() {
            const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
            const isStandalone = window.navigator.standalone === true;
            if (isIos && !isStandalone) {
                setTimeout(() => {
                    document.getElementById('iosInstallModal').classList.remove('hidden');
                    document.getElementById('iosInstallModal').style.display = 'flex';
                }, 3000);
            }
        }

        async function handleInstall() {
            const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
            if (isIos) {
                document.getElementById('iosInstallModal').classList.remove('hidden');
                document.getElementById('iosInstallModal').style.display = 'flex';
            } else if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') deferredPrompt = null;
            } else {
                showToast("التطبيق مثبت بالفعل ✅");
            }
        }

        // --- وظائف المتجر ---
        function renderCategories() {
            const cats = ['الكل', ...new Set(menu.map(i => i.cat))];
            document.getElementById('menuCategories').innerHTML = cats.map(c => `
                <button onclick="filterItems('${c}')" class="category-card whitespace-nowrap px-8 py-4 bg-white rounded-2xl font-black text-slate-600 shadow-sm border-2 border-transparent hover:border-blue-600 hover:text-blue-600 transition-all">
                    ${c}
                </button>
            `).join('');
        }

        function renderItems(filter = 'الكل') {
            const grid = document.getElementById('itemsGrid');
            const items = filter === 'الكل' ? menu : menu.filter(i => i.cat === filter);
            grid.innerHTML = items.map(item => `
                <div class="bg-white rounded-[35px] p-6 shadow-sm border border-slate-100 relative group transition-all hover:shadow-xl">
                    <div class="text-5xl mb-4 bg-slate-50 w-20 h-20 rounded-3xl flex items-center justify-center">${item.img}</div>
                    <h3 class="text-xl font-black text-slate-900 mb-1">${item.name}</h3>
                    <p class="text-slate-400 text-sm mb-6">${item.cat}</p>
                    <div class="grid grid-cols-3 gap-2">
                        ${Object.entries(item.price).map(([size, p]) => `
                            <button onclick="addToCart(${item.id}, '${size}')" class="bg-slate-50 hover:bg-blue-800 hover:text-white py-3 rounded-2xl transition-all flex flex-col items-center">
                                <span class="text-[10px] uppercase font-black opacity-50">${size === 's' ? 'صغير' : size === 'm' ? 'وسط' : 'كبير'}</span>
                                <span class="font-black">${p}﷼</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id, size) {
            const item = menu.find(i => i.id === id);
            cart.push({ ...item, selectedSize: size, finalPrice: item.price[size] });
            updateCartDisplay();
            showToast(`تمت إضافة ${item.name} ✅`);
        }

        function updateCartDisplay() {
            const bar = document.getElementById('cartBar');
            if (cart.length > 0) {
                bar.classList.remove('translate-y-full');
                const total = cart.reduce((sum, item) => sum + item.finalPrice, 0);
                document.getElementById('cartCount').innerText = cart.length;
                document.getElementById('totalPrice').innerText = (isNeighbor ? total * 0.9 : total).toFixed(1) + '﷼';
            } else {
                bar.classList.add('translate-y-full');
            }
        }

        function openCartModal() {
            const total = cart.reduce((sum, item) => sum + item.finalPrice, 0);
            const discounted = isNeighbor ? total * 0.9 : total;
            
            document.getElementById('modalTitle').innerText = 'تأكيد الطلب';
            document.getElementById('modalContent').innerHTML = `
                <div class="space-y-4 mb-8">
                    ${cart.map((item, i) => `
                        <div class="flex justify-between items-center bg-slate-50 p-5 rounded-3xl">
                            <div>
                                <h4 class="font-black text-slate-900">${item.name}</h4>
                                <p class="text-xs font-bold text-slate-400">الحجم: ${item.selectedSize}</p>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="font-black text-blue-900">${item.finalPrice}﷼</span>
                                <button onclick="removeFromCart(${i})" class="text-red-500 w-8 h-8 bg-red-50 rounded-full flex items-center justify-center">✕</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                ${isNeighbor ? `<div class="bg-green-50 p-4 rounded-2xl mb-4 text-green-700 font-black text-center text-sm">تم تطبيق خصم 10% (أهل حي بدر) 🏠</div>` : ''}
                <div class="flex flex-col gap-4">
                    <button onclick="sendOrder()" class="w-full bg-blue-800 text-white py-5 rounded-[25px] font-black text-xl shadow-xl shadow-blue-100">إرسال عبر واتساب 💬</button>
                    <button onclick="saveFavorite()" class="w-full bg-pink-50 text-pink-600 py-4 rounded-[25px] font-black border-2 border-pink-100">حفظ كطلب مفضل ❤️</button>
                </div>
            `;
            document.getElementById('mainModal').style.display = 'flex';
        }

        function sendOrder() {
            const total = cart.reduce((sum, item) => sum + item.finalPrice, 0);
            const final = isNeighbor ? total * 0.9 : total;
            let msg = `*طلب جديد - فوال مروه*%0A------------------%0A`;
            cart.forEach(i => msg += `• ${i.name} (${i.selectedSize}) - ${i.finalPrice}﷼%0A`);
            msg += `------------------%0A*المجموع: ${final.toFixed(1)}﷼*`;
            if(isNeighbor) msg += `%0A*(أهل حي بدر)*`;
            
            // تسجيل المبيعات محلياً لصاحب المحل
            const sales = JSON.parse(localStorage.getItem('m_sales_history') || '[]');
            sales.push({ date: new Date().toLocaleString(), items: [...cart], total: final });
            localStorage.setItem('m_sales_history', JSON.stringify(sales));

            window.open(`https://wa.me/966550269399?text=${msg}`);
            cart = [];
            updateCartDisplay();
            closeModal();
        }

        // --- وظائف مساعدة ---
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('hidden'); }
        function closeModal() { document.getElementById('mainModal').style.display = 'none'; }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }
        function removeFromCart(i) { cart.splice(i, 1); updateCartDisplay(); openCartModal(); if(cart.length===0) closeModal(); }
        function saveFavorite() {
            const favs = JSON.parse(localStorage.getItem('m_favs_list') || '[]');
            favs.push({ items: [...cart], total: cart.reduce((s,i)=>s+i.finalPrice,0) });
            localStorage.setItem('m_favs_list', JSON.stringify(favs));
            showToast("تم الحفظ في المفضلة ❤️");
        }
        function openFavs() {
            const favs = JSON.parse(localStorage.getItem('m_favs_list') || '[]');
            document.getElementById('modalTitle').innerText = 'المفضلة';
            document.getElementById('modalContent').innerHTML = `<div class="space-y-4">${favs.map((f,i) => `
                <div onclick="applyFavorite(${i})" class="bg-slate-50 p-5 rounded-3xl flex justify-between cursor-pointer border-2 border-transparent hover:border-pink-200">
                    <span class="font-black">طلب #${i+1} (${f.items.length} أصناف)</span>
                    <span class="text-red-600 font-black">${f.total}﷼</span>
                </div>`).join(favs.length?'':'<p class="text-center py-10 opacity-30">لا توجد مفضلات</p>')}</div>`;
            document.getElementById('mainModal').style.display = 'flex';
        }
        function applyFavorite(i) { 
            const favs = JSON.parse(localStorage.getItem('m_favs_list') || '[]');
            cart = [...favs[i].items]; updateCartDisplay(); renderItems(); closeModal(); showToast("تم استرجاع الطلب ✅"); 
        }
        function openNbrModal() {
            document.getElementById('modalContent').innerHTML = `
                <div class="text-center">
                    <h2 class="text-2xl font-black mb-4">تفعيل حي بدر</h2>
                    <input type="text" id="nbrInput" placeholder="أدخل الكود" class="w-full p-5 bg-slate-50 rounded-3xl border-2 border-slate-100 outline-none text-center font-black text-2xl mb-4">
                    <button onclick="verifyNbr()" class="w-full bg-blue-800 text-white py-5 rounded-[25px] font-black">تفعيل</button>
                </div>`;
            document.getElementById('mainModal').style.display = 'flex';
        }
        function verifyNbr() {
            if(document.getElementById('nbrInput').value === "حي بدر") {
                isNeighbor = true; localStorage.setItem('isNbr', 'true');
                setNeighborUI(); closeModal(); showToast("حي بدر مفعل ✅");
            }
        }
        function setNeighborUI() {
            const btn = document.getElementById('nbrBtn');
            btn.classList.replace('from-blue-700', 'from-green-600');
            btn.innerHTML = `<i class="fa-solid fa-circle-check"></i> حي بدر مفعل`;
            updateCartDisplay();
        }

        // سجل المبيعات بكلمة سر بسيطة
        function openHistory() {
            const pass = prompt("أدخل كلمة مرور الإدارة:");
            if(pass === "1234") {
                const sales = JSON.parse(localStorage.getItem('m_sales_history') || '[]');
                document.getElementById('modalTitle').innerText = 'سجل المبيعات';
                document.getElementById('modalContent').innerHTML = `<div class="space-y-4 text-left font-sans" dir="ltr">${sales.reverse().map(s => `
                    <div class="p-4 bg-slate-50 rounded-xl text-[10px] border-l-4 border-blue-500">
                        <div class="font-black text-blue-900 mb-1">${s.date}</div>
                        <div>Items: ${s.items.map(i=>i.name).join(', ')}</div>
                        <div class="font-black">Total: ${s.total}﷼</div>
                    </div>`).join('')}</div>`;
                document.getElementById('mainModal').style.display = 'flex';
            } else {
                showToast("كلمة مرور خاطئة ❌");
            }
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => console.log('SW Registered'));
            });
        }
    </script>
</body>
</html>
